{% extends 'base.html' %}
{% block title %}Student Form{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm p-4">
<h2 class="text-danger text-center">
  {%if form.instance.id%}
UPDATE STUDENT
  {%else%}
  ADD STUDENT
  {%endif%}
</h2>
  {% if messages %}
    {% for message in messages %}
     <div class="alert alert-{{message.tags}} alert-success"  role="alert">
        {{message}}
    </div>
    {% endfor %}
    {% endif %}
<form method="post">
    {% csrf_token %}
  {{ form.as_p }}
<button class="btn btn-primary w-100" type="submit">
  {%if form.instance.id%}
  UPDATE STUDENT
  {%else%}
  ADD STUDENT
  {%endif%}
</button>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
